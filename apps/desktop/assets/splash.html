<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Open Design</title>
    <style>
      html,
      body {
        background: #070b19;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        align-items: center;
        display: flex;
        justify-content: center;
      }
      video {
        background: #070b19;
        height: auto;
        max-height: 100%;
        max-width: 100%;
        width: auto;
      }
    </style>
  </head>
  <body>
    <video
      id="splash"
      autoplay
      muted
      playsinline
      disablepictureinpicture
      src="splash.mp4"
    ></video>
    <script>
      (function () {
        var video = document.getElementById("splash");
        if (!video) return;
        var play = function () {
          var attempt = video.play();
          if (attempt && typeof attempt.catch === "function") attempt.catch(function () {});
        };
        video.addEventListener("loadedmetadata", function () { video.currentTime = 0; });
        video.addEventListener("loadeddata", play);
        play();
      })();
    </script>
  </body>
</html>
